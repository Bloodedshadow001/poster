<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parasara Phone QR</title>
    <style>
      :root {
        color: #17202a;
        background: #f5f7fb;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        display: grid;
        gap: 18px;
        justify-items: center;
        padding: 24px;
        border: 1px solid rgba(21, 58, 91, .14);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(16, 47, 74, .12);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      img {
        width: min(300px, 100%);
        aspect-ratio: 1;
        border: 12px solid #fff;
      }

      a {
        color: #153a5b;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      p {
        margin: 0;
        color: #667085;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Scan to Open Parasara</h1>
      <img alt="QR code for Parasara mobile URL" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&amp;margin=12&amp;data=http%3A%2F%2F192.168.31.25%3A5174">
      <a href="http://192.168.31.25:5174">http://192.168.31.25:5174</a>
      <p>Keep your phone and laptop on the same Wi-Fi.</p>
    </main>
  </body>
</html>
